<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mario Flash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
</style>
</head>
<body>

<script src="ruffle/ruffle.js"></script>
<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.RufflePlayer.config = {
    allowScriptAccess: "always",
    renderBackend: "canvas",
    quality: "low",
  };

  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    // Player maly — Ruffle tworzy canvas buffer w rozmiarze 550x400
    // Shadow root istnieje dopiero po appendChild, wiec kolejnosc jest wazna
    player.style.position = "fixed";
    player.style.top      = "0";
    player.style.left     = "0";
    player.style.width    = "550px";
    player.style.height   = "400px";
    document.body.appendChild(player); // <-- shadow root tworzy sie tutaj

    const root = player.shadowRoot;
    if (root) {
      function applyPixelStyle(canvas) {
        canvas.style.position        = "fixed";
        canvas.style.top             = "0";
        canvas.style.left            = "0";
        canvas.style.width           = "100vw";
        canvas.style.height          = "100vh";
        canvas.style.imageRendering  = "pixelated";
      }

      const canvasObserver = new MutationObserver(() => {
        const canvas = root.querySelector("canvas");
        if (!canvas) return;
        canvasObserver.disconnect();

        applyPixelStyle(canvas);

        // Re-aplikuj jesli Ruffle zresetuje styl
        const styleObserver = new MutationObserver(() => {
          if (canvas.style.position !== "fixed") {
            applyPixelStyle(canvas);
          }
        });
        styleObserver.observe(canvas, { attributes: true, attributeFilter: ["style"] });
      });

      canvasObserver.observe(root, { childList: true, subtree: true });
    }

    player.load("SMF.swf");

    // WASD + E -> strzalki + spacja
    const WASD = {
      KeyW: { key: "ArrowUp",    keyCode: 38 },
      KeyA: { key: "ArrowLeft",  keyCode: 37 },
      KeyS: { key: "ArrowDown",  keyCode: 40 },
      KeyD: { key: "ArrowRight", keyCode: 39 },
      KeyE: { key: " ",          keyCode: 32 },
    };
    function remap(e, type) {
      const m = WASD[e.code];
      if (!m) return;
      window.dispatchEvent(new KeyboardEvent(type, {
        key: m.key, code: m.key, keyCode: m.keyCode, which: m.keyCode,
        bubbles: true, cancelable: true,
      }));
    }
    window.addEventListener("keydown", e => remap(e, "keydown"));
    window.addEventListener("keyup",   e => remap(e, "keyup"));
  });
</script>

</body>
</html>
