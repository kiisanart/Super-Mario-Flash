<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mario Flash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
  ruffle-player { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>

<script>
  // Patch imageSmoothingEnabled na obu typach kontekstu (normalny + offscreen)
  function patchSmoothing(proto) {
    if (!proto) return;
    Object.defineProperty(proto, "imageSmoothingEnabled", {
      get: () => false,
      set: () => {},
      configurable: true,
    });
  }
  patchSmoothing(CanvasRenderingContext2D.prototype);
  if (typeof OffscreenCanvasRenderingContext2D !== "undefined") {
    patchSmoothing(OffscreenCanvasRenderingContext2D.prototype);
  }
</script>
<script src="ruffle/ruffle.js"></script>
<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.RufflePlayer.config = {
    allowScriptAccess: "always",
    renderBackend: "canvas",
    quality: "low",
  };

  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();

    // Maly player — Ruffle tworzy canvas w natywnym rozmiarze stage (ok 550x400)
    // Potem rozciagamy canvas CSS-em na caly ekran z pixelated
    player.style.cssText = `
      position: fixed;
      width: 550px;
      height: 400px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      overflow: visible;
    `;
    document.body.appendChild(player);

    // Kiedy Ruffle stworzy canvas — ustaw mu styl bezposrednio na elemencie
    const observer = new MutationObserver(() => {
      const canvas = player.shadowRoot?.querySelector("canvas");
      if (!canvas) return;
      observer.disconnect();
      canvas.style.cssText = `
        width: 100vw !important;
        height: 100vh !important;
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        image-rendering: pixelated !important;
        image-rendering: crisp-edges !important;
      `;
    });
    if (player.shadowRoot) {
      observer.observe(player.shadowRoot, { childList: true, subtree: true });
    }

    player.load("SMF.swf");

    const WASD = {
      KeyW: { key: "ArrowUp",    keyCode: 38 },
      KeyA: { key: "ArrowLeft",  keyCode: 37 },
      KeyS: { key: "ArrowDown",  keyCode: 40 },
      KeyD: { key: "ArrowRight", keyCode: 39 },
      KeyE: { key: " ",          keyCode: 32 },
    };
    function remap(e, type) {
      const m = WASD[e.code];
      if (!m) return;
      window.dispatchEvent(new KeyboardEvent(type, {
        key: m.key, code: m.key, keyCode: m.keyCode, which: m.keyCode,
        bubbles: true, cancelable: true,
      }));
    }
    window.addEventListener("keydown", e => remap(e, "keydown"));
    window.addEventListener("keyup",   e => remap(e, "keyup"));
  });
</script>

</body>
</html>
