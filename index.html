<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Mario Flash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }
  ruffle-player {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>

<script>
  // Patch WebGL PRZED zaladowaniem Ruffle — zastepuje LINEAR na NEAREST dla wszystkich tekstur.
  // Ruffle renderuje przez WebGL i domyslnie uzywa bilinear filtering na sprite'ach.
  // Patch musi byc przed ruffle.js zeby zlapal stworzenie kontekstu WebGL.
  (function() {
    const _getContext = HTMLCanvasElement.prototype.getContext;
    HTMLCanvasElement.prototype.getContext = function(type, opts) {
      const ctx = _getContext.call(this, type, opts);
      if (!ctx) return ctx;
      if (type === "webgl" || type === "webgl2") {
        const LINEAR              = ctx.LINEAR;
        const NEAREST             = ctx.NEAREST;
        const NEAREST_MIPMAP_NEAREST = ctx.NEAREST_MIPMAP_NEAREST;
        const _texParam = ctx.texParameteri.bind(ctx);
        ctx.texParameteri = function(target, pname, param) {
          if (param === LINEAR)                    param = NEAREST;
          if (param === ctx.LINEAR_MIPMAP_LINEAR)  param = NEAREST_MIPMAP_NEAREST;
          if (param === ctx.LINEAR_MIPMAP_NEAREST) param = NEAREST_MIPMAP_NEAREST;
          _texParam(target, pname, param);
        };
      }
      return ctx;
    };
  })();
</script>

<script src="ruffle/ruffle.js"></script>
<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.RufflePlayer.config = {
    quality: "low",
    letterbox: "on",
    allowScriptAccess: "always",
  };

  window.addEventListener("load", () => {
    const ruffle = window.RufflePlayer.newest();
    const player = ruffle.createPlayer();
    player.style.width  = "100vw";
    player.style.height = "100vh";
    document.body.appendChild(player);
    player.load("SMF.swf");

    // WASD -> strzalki
    const WASD_MAP = {
      KeyW: { key: "ArrowUp",    code: "ArrowUp",    keyCode: 38 },
      KeyA: { key: "ArrowLeft",  code: "ArrowLeft",  keyCode: 37 },
      KeyS: { key: "ArrowDown",  code: "ArrowDown",  keyCode: 40 },
      KeyD: { key: "ArrowRight", code: "ArrowRight", keyCode: 39 },
    };

    function remap(e, type) {
      const mapped = WASD_MAP[e.code];
      if (!mapped) return;
      window.dispatchEvent(new KeyboardEvent(type, {
        key: mapped.key, code: mapped.code,
        keyCode: mapped.keyCode, which: mapped.keyCode,
        bubbles: true, cancelable: true,
      }));
    }

    window.addEventListener("keydown", e => remap(e, "keydown"));
    window.addEventListener("keyup",   e => remap(e, "keyup"));
  });
</script>

</body>
</html>
